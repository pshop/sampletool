# .github/workflows/tests.yml
# -----------------------------------------------------------------------------
# Ce fichier configure l'intégration continue (CI) avec GitHub Actions.
# À chaque push ou pull request, GitHub va automatiquement :
#   1. Installer Python
#   2. Installer les dépendances du projet
#   3. Lancer les tests avec pytest
# -----------------------------------------------------------------------------

name: Tests

# Déclencheurs : s'exécute sur chaque push et chaque pull request
on:
  push:
    branches: ["**"]   # Tous les branches
  pull_request:
    branches: ["**"]

jobs:
  test:
    # On teste sur les 3 plateformes cibles
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      # Étape 1 : Récupérer le code source du repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 2 : Installer la version Python cible
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Étape 3 : Installer le projet et ses dépendances
      # Le flag -e installe en mode "editable" (les modifications sont prises en compte sans réinstaller)
      # [dev] installe aussi les dépendances de développement (pytest, etc.)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Étape 4 : Lancer les tests
      - name: Run tests
        run: pytest
